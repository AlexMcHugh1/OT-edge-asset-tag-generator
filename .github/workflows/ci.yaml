name: CI

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/alexmchugh1/ot-edge-asset-tag-generator

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test ./...

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    name: Update Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up SSH for manifest repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MANIFEST_DEPLOY_KEY }}

      - name: Clone manifest repo
        run: |
          git clone git@github.com:AlexMcHugh1/k8s-manifests.git
          cd k8s-manifests
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"

      - name: Update image tag
        run: |
          cd k8s-manifests
          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          cd apps/dfx-tag-generator/overlays/production
          kustomize edit set image ghcr.io/alexmchugh1/ot-edge-asset-tag-generator=ghcr.io/alexmchugh1/ot-edge-asset-tag-generator:${IMAGE_TAG}

      - name: Commit and push
        run: |
          cd k8s-manifests
          git add .
          git diff --staged --quiet || git commit -m "ci: update dfx-tag-generator to sha-$(echo ${{ github.sha }} | cut -c1-7)

          Source: ${{ github.repository }}@${{ github.sha }}"
          git push