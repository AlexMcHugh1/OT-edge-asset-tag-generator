name: CI

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/alexmchughdev/ot-edge-asset-tag-generator

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test ./...

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    name: Update Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up SSH for manifest repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MANIFEST_DEPLOY_KEY }}

      - name: Clone manifest repo
        run: |
          git clone git@github.com:alexmchughdev/platform-engineering.git
          cd platform-engineering
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"

      - name: Install kustomize
        env:
          KUSTOMIZE_VERSION: v5.4.3
        run: |
          curl -fsSL \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            -o kustomize.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Bump image tag in overlay
        run: |
          cd platform-engineering/apps/ot-edge-asset-tag-generator/overlays/production
          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          kustomize edit set image \
            ghcr.io/alexmchughdev/ot-edge-asset-tag-generator=ghcr.io/alexmchughdev/ot-edge-asset-tag-generator:${IMAGE_TAG}

      - name: Commit and push
        run: |
          cd platform-engineering
          git add apps/ot-edge-asset-tag-generator/
          git diff --staged --quiet || git commit -m "ci: bump ot-edge-asset-tag-generator to sha-$(echo ${{ github.sha }} | cut -c1-7)

          Source: ${{ github.repository }}@${{ github.sha }}"
          git push
